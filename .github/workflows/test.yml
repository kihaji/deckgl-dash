name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        dash-version: ['3.4.0', '4.3.0']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies  # npm ci fails on a stale package-lock.json
        run: npm ci

      - name: Verify poetry.lock is current
        run: |
          pip install poetry
          poetry check --lock

      - name: Run JavaScript tests
        run: npm test

      - name: Build JavaScript bundle
        run: npm run build:js

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          poetry install
          poetry run pip install "dash[testing]==${{ matrix.dash-version }}"

      - name: Run ruff linter
        run: poetry run ruff check .

      - name: Run Pyright type checker
        run: poetry run npx pyright

      - name: Run Python tests with coverage
        run: poetry run pytest tests/ -v --cov=deckgl_dash --cov-report=term-missing

      - name: Run browser integration smoke test
        env:
          DECKGL_BROWSER_TESTS: '1'
        run: poetry run pytest tests/test_integration_smoke.py tests/test_maplibre_toggle.py --headless -v

  # Build the wheel once per PR (was previously repeated inside the test matrix)
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build JavaScript bundle
        run: npm run build:js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python package
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry build

      - name: Verify package with twine
        run: |
          pip install twine
          twine check dist/*
