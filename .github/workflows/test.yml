name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        dash-version: ['3.4.0', '4.3.0']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies  # npm ci fails on a stale package-lock.json
        run: npm ci

      - name: Run JavaScript tests
        run: npm test

      - name: Build JavaScript bundle
        run: npm run build:js

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify uv.lock is current
        run: uv lock --check

      - name: Install Python dependencies  # bundle already built above, skip the hook
        env:
          DECKGL_DASH_SKIP_JS_BUILD: '1'
        run: |
          uv sync
          uv pip install "dash[testing]==${{ matrix.dash-version }}"

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Run Pyright type checker
        run: uv run npx pyright

      - name: Run Python tests with coverage
        run: uv run pytest tests/ -v --cov=deckgl_dash --cov-report=term-missing

      - name: Run browser integration smoke test
        env:
          DECKGL_BROWSER_TESTS: '1'
        run: uv run pytest tests/test_integration_smoke.py tests/test_maplibre_toggle.py tests/test_binary_paths.py --headless -v

  # Build the wheel once per PR — uv build runs the JS build via the hatch hook
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Build Python package (self-building wheel)
        run: uv build

      - name: Verify package with twine
        run: uvx twine check dist/*
