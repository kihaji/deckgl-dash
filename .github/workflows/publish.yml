name: Publish to PyPI

on:
  push:
    tags:
      # Only clean version tags (v0.1.0), not pre-release (v0.1.0-test, v0.1.0-rc1)
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  # Build runs npm ci (hundreds of packages' postinstall scripts, via the hatch build
  # hook inside uv build) — it holds no publish credentials. Only the artifact it
  # produces crosses into the publish job.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        run: python3 scripts/check_versions.py "${GITHUB_REF_NAME#v}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Build Python package (JS bundle built by the hatch hook)
        run: uv build

      - name: Verify package with twine
        run: uvx twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Least-privilege publish: downloads the artifact and publishes via OIDC trusted
  # publishing only — no npm, no build code, no token secret.
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # Trusted publishing via OIDC

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
